name: Approve Song Suggestion

on:
  issues:
    types:
      - labeled

permissions:
  contents: write
  issues: write

jobs:
  approve-song:
    if: github.event.label.name == 'approved-song'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Import approved issue into the songbook
        run: node scripts/import-approved-issue.mjs --event "$GITHUB_EVENT_PATH"

      - name: Commit and push songbook update
        id: commit
        run: |
          git config user.name "front-porch-band[bot]"
          git config user.email "front-porch-band[bot]@users.noreply.github.com"
          git add approved-charts charts data/songs.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Approve song suggestion #${{ github.event.issue.number }}"
          git fetch origin main
          git pull --rebase origin main
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const changed = '${{ steps.commit.outputs.changed }}' === 'true';
            const body = changed
              ? 'Imported this suggestion into the repo songbook and closed it.'
              : 'This suggestion was already imported, so there was nothing new to commit. Closing it now.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
