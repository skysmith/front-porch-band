<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Front Porch Band icon">
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="45%" stop-color="#d7dee9" />
      <stop offset="100%" stop-color="#8d98a8" />
    </linearGradient>
    <linearGradient id="metalDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b6bfcb" />
      <stop offset="100%" stop-color="#6d7787" />
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.28" />
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="#f3f6fb" />

  <g filter="url(#shadow)" transform="translate(64 64)">
    <g transform="rotate(-36)">
      <ellipse cx="-21" cy="-24" rx="16" ry="26" fill="#0f172a" />
      <ellipse cx="-21" cy="-24" rx="13" ry="23" fill="#ffffff" />
      <ellipse cx="-21" cy="-24" rx="10" ry="19" fill="url(#metalDark)" />
      <ellipse cx="-18" cy="-20" rx="4" ry="8" fill="#ffffff" opacity="0.7" />
      <rect x="-6" y="-1" width="48" height="10" rx="4.5" fill="url(#metal)" />
      <rect x="26" y="-6" width="16" height="34" rx="8" fill="#0f172a" />
    </g>

    <g transform="rotate(36)">
      <ellipse cx="-21" cy="-24" rx="16" ry="26" fill="#0f172a" />
      <ellipse cx="-21" cy="-24" rx="13" ry="23" fill="#ffffff" />
      <ellipse cx="-21" cy="-24" rx="10" ry="19" fill="url(#metalDark)" />
      <ellipse cx="-18" cy="-20" rx="4" ry="8" fill="#ffffff" opacity="0.7" />
      <rect x="-6" y="-1" width="48" height="10" rx="4.5" fill="url(#metal)" />
      <rect x="26" y="-6" width="16" height="34" rx="8" fill="#0f172a" />
    </g>
  </g>
</svg>
