<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Front Porch Band</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <button id="show-rail" class="show-rail-button" type="button" aria-label="Show song list">Songs</button>

      <aside class="song-rail" id="song-rail">
        <div class="song-rail-top">
          <button id="toggle-rail" class="rail-toggle" type="button" aria-label="Collapse song list">Hide songs</button>
        </div>

        <div class="brand-block">
          <p class="eyebrow">Songbook</p>
          <h1>Front Porch Band</h1>
          <p class="tagline">Phone-first chord charts for the porch, the kitchen, and whoever forgot the second verse.</p>
        </div>

        <label class="search-wrap" for="song-search">
          <span>Find a song</span>
          <input id="song-search" type="search" placeholder="Search title or artist" autocomplete="off" />
        </label>

        <nav id="song-list" class="song-list" aria-label="Song list"></nav>
      </aside>

      <main class="song-stage">
        <header class="song-header">
          <div>
            <h2 id="song-title">Front Porch Band</h2>
            <p id="song-artist" class="song-artist">Charts stay monospace so spacing survives on mobile.</p>
          </div>

          <div class="view-controls">
            <div class="font-pill" aria-label="Chart font size">
              <button id="font-down" type="button" aria-label="Decrease chart size">A-</button>
              <button id="font-up" type="button" aria-label="Increase chart size">A+</button>
            </div>
          </div>
        </header>

        <details class="chord-helper" id="chord-helper">
          <summary class="chord-helper-summary">
            <span>Chart Tools</span>
            <span id="chord-helper-meta" class="chord-helper-meta">Guitar</span>
          </summary>

          <div class="chord-tool-row">
            <label class="transpose-picker" for="transpose-select">
              <span>Transpose</span>
              <select id="transpose-select"></select>
            </label>
            <label class="instrument-picker" for="instrument-select">
              <span>Instrument</span>
              <select id="instrument-select"></select>
            </label>
            <button id="reset-transpose" class="secondary-button tool-row-action" type="button" aria-label="Reset transposition">Reset</button>
          </div>

          <div class="chord-helper-controls">
            <p id="chord-helper-count" class="chord-helper-count">No chords loaded yet.</p>
          </div>

          <div id="chord-grid" class="chord-grid"></div>
        </details>

        <section class="chart-card">
          <pre id="chart-body" class="chart-body">Choose a song from the list on the left.</pre>
        </section>

        <aside class="qr-card" aria-label="Share current song">
          <img
            id="qr-image"
            class="qr-image"
            alt="QR code for the current song page"
            src=""
          />
        </aside>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
